[tools]
node = "24"
pnpm = "latest"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[hooks]
postinstall = """
if [ -z "$CI" ]; then
  pnpm install
fi
"""

[tasks.dev]
run = "vite dev"

[tasks."convex:dev"]
description = "Run the Convex dev backend (regenerates types under convex/_generated)."
run = "convex dev"

[tasks."convex:seed"]
description = "Seed the Convex deployment with demo contacts."
run = "convex run seed:run"

[tasks.build]
run = "vite build"

[tasks.preview]
run = "vite preview"

[tasks.serve]
run = "react-router-serve build/server/index.js"

[tasks.fmt]
run = "oxfmt"

[tasks.lint]
run = "oxlint --fix"

[tasks."typegen:react-router"]
run = "react-router typegen"

[tasks.typecheck]
depends = ["typegen:react-router"]
run = "tsgo --noEmit"

[tasks.check]
depends = ["fmt", "lint", "typecheck"]
